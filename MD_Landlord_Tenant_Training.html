  .option.correct { border-color: var(--teal); background: var(--teal-light); } .option.correct .opt-letter { background: var(--teal); border-color: var(--teal); color: #fff; }

  .topics-row { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin: 1rem 0; }
  .topic-badge { font-size: 12px; font-weight: 600; padding: 4px 12px; border-radius: 99px; }
  .topic-badge.a { background: var(--blue-light); color: var(--blue-dark); }
  .topic-badge.b { background: var(--teal-light); color: var(--teal-dark); }
  .topic-badge.c { background: var(--amber-light); color: var(--amber-dark); }
  .topic-badge.d { background: var(--red-light); color: var(--red-dark); }

<script>
const slides = [
  {
    type: 'learn', label: 'Overview', title: 'Maryland Landlord-Tenant Law: The Basics',
    intro: 'Maryland landlord-tenant law consists of regulations created by state and local governments to safeguard the rights of both landlords and tenants. U.S.VETS housing staff need to understand these rules to protect the veterans we serve and work effectively with partner landlords across Maryland.',
    sections: [
      {
        heading: 'Key Facts at a Glance', type: 'grid',
        items: [
          { label: 'Security Deposit Cap', value: '1 month\'s rent', sub: 'Recent change — was 2 months' },
          { label: 'Deposit Return Deadline', value: '45 days', sub: 'After tenant vacates' },
          { label: 'Deposit Interest', value: 'Per current state law', sub: 'Rate subject to change' },
          { label: 'Written Lease', value: 'Required 1+ yr terms', sub: 'Strongly recommended always' },
          { label: 'Entry Notice Required', value: 'Reasonable notice', sub: 'Not defined by statute' },
          { label: 'Tenancy Termination', value: 'Per statute & notice', sub: 'Depends on tenancy type' }
        ]
      },
      {
        heading: 'Why This Matters for U.S.VETS', type: 'callouts',
        items: [
          { type: 'blue', icon: '🏠', title: 'Housing program staff', text: 'Need to know Maryland\'s strict deposit rules — including the 1-month cap — to help veterans recover deposits and dispute unlawful deductions.' },
          { type: 'teal', icon: '⚖️', title: 'Case managers', text: 'Should understand that Maryland permits certain tenancy terminations without proof of tenant misconduct, provided statutory notice and court procedures are followed. Timelines and rules vary by tenancy type and local law.' },
          { type: 'amber', icon: '📋', title: 'Property liaisons', text: 'Must ensure partner landlords are following Maryland\'s deposit banking requirements, proper notice procedures, and all applicable local ordinances.' }
        ]
      }
    ]
  },
  {
    type: 'learn', label: 'Lease Agreements', title: 'Maryland Lease Agreements',
    intro: 'Maryland recognizes both written and oral rental agreements. Written leases are generally required for lease terms exceeding one year and are strongly recommended for all tenancies to prevent disputes and ensure clarity.',
    sections: [
      {
        heading: 'Lease Types', type: 'callouts',
        items: [
          { type: 'blue', icon: '📄', title: 'Fixed-term lease', text: 'Has a specific start and end date, often one year. Both parties are bound to the terms. At expiration, the lease may be renewed, converted to month-to-month, or terminated per the terms and applicable law.' },
          { type: 'teal', icon: '🔄', title: 'Month-to-month lease', text: 'Renews automatically each month until either party gives proper notice. In most month-to-month residential tenancies, landlords generally must provide 60 days\' notice to terminate. Tenants typically need only 30 days\' notice.' },
          { type: 'amber', icon: '⚠️', title: 'Oral agreements', text: 'Maryland recognizes oral rental agreements, particularly for shorter-term tenancies. However, oral agreements are difficult to enforce. Written leases are strongly recommended in all circumstances.' }
        ]
      },
      {
        heading: 'Required Lease Contents', type: 'list',
        items: [
          'Names and addresses of all parties',
          'Property address and description of the premises',
          'Lease term (start and end dates)',
          'Monthly rent amount and due date',
          'Security deposit amount and conditions for return',
          'Late fee policies (if any)',
          'Pet policy and utility responsibilities',
          'Any rules or restrictions specific to the property'
        ]
      },
      {
        heading: 'Important Maryland-Specific Lease Rules', type: 'callouts',
        items: [
          { type: 'red', icon: '🚫', title: 'No waiving tenant rights', text: 'Lease provisions that attempt to waive a tenant\'s legal rights under Maryland law are unenforceable — even if the tenant signed the lease.' },
          { type: 'blue', icon: '📋', title: 'Tenant screening', text: 'Landlords who use tenant screening reports should comply with applicable federal and state consumer reporting requirements. Specific disclosure obligations depend on whether adverse action is taken and which reports are used.' }
        ]
      }
    ]
  },
  {
    type: 'learn', label: 'Security Deposits', title: 'Security Deposits in Maryland',
    intro: 'Maryland has some of the most specific security deposit rules in the country. A recent change reduced the maximum deposit from two months\' rent to one month\'s rent. Landlords who fail to follow these rules face significant penalties.',
    sections: [
      {
        heading: 'Deposit Rules at a Glance', type: 'grid',
        items: [
          { label: 'Maximum Amount', value: '1 month\'s rent', sub: 'Changed from prior 2-month cap' },
          { label: 'Return Deadline', value: '45 days', sub: 'After tenant vacates' },
          { label: 'Interest Required', value: 'Yes', sub: 'Per current Maryland law' },
          { label: 'Banking Requirement', value: 'Per state statute', sub: 'Federally insured institution' }
        ]
      },
      {
        heading: 'Allowable Deductions', type: 'callouts',
        items: [
          { type: 'blue', icon: '💰', title: 'Unpaid rent', text: 'Any rent owed at the time the tenant moves out may be deducted.' },
          { type: 'amber', icon: '🔨', title: 'Damage beyond normal wear and tear', text: 'Landlords may deduct for damage exceeding ordinary use — not for fading paint, minor scuffs, or carpet worn through normal occupancy.' },
          { type: 'teal', icon: '🧹', title: 'Cleaning costs and lease breach costs', text: 'Deductions may be made for cleaning or costs arising from other breaches of lease terms, if documented and itemized.' }
        ]
      },
      {
        heading: 'Banking and Interest Requirements', type: 'callouts',
        items: [
          { type: 'blue', icon: '🏦', title: 'Where deposits must be held', text: 'Security deposits must be maintained in accordance with Maryland\'s statutory banking requirements, which require use of a federally insured financial institution.' },
          { type: 'teal', icon: '📈', title: 'Interest accrual', text: 'Maryland requires qualifying security deposits to accrue interest in accordance with current state law. The applicable rate is subject to change — landlords should verify the current requirement.' }
        ]
      },
      {
        heading: 'Landlord Penalties for Non-Compliance', type: 'callouts',
        items: [
          { type: 'red', icon: '⚖️', title: 'Failure to return deposit', text: 'If a landlord fails to return the deposit or provide an itemized deduction list within 45 days, failure to comply may significantly limit a landlord\'s ability to retain or deduct from the deposit and may expose the landlord to statutory penalties including damages and attorney fees.' }
        ]
      }
    ]
  },
  {
    type: 'learn', label: 'Landlord Obligations', title: 'Landlord Obligations & Tenant Rights',
    intro: 'Maryland law places real duties on landlords to maintain safe, habitable properties. Tenants have enforceable rights when those duties are not met — and landlords cannot retaliate against tenants who assert them.',
    sections: [
      {
        heading: 'Habitability Requirements', type: 'callouts',
        items: [

        heading: 'Tenant Remedies for Unaddressed Repairs', type: 'list',

          'File a complaint with local housing authorities or code enforcement',
          'Withhold rent (in limited circumstances, and only through proper legal channels)',
          'Pursue a rent escrow action in District Court',
          'In some circumstances, serious habitability violations may allow a tenant to terminate the tenancy after following appropriate legal procedures'

        heading: 'Fair Housing', type: 'callouts',

        heading: 'Retaliation Protections', type: 'callouts',

          { type: 'red', icon: '🚫', title: 'Retaliation is prohibited', text: 'Landlords cannot raise rent, cut services, or threaten eviction because a tenant filed a complaint, requested repairs, or contacted a housing authority. Retaliation is a separate legal violation in Maryland.' }

      {
        heading: 'Common Grounds for Eviction', type: 'list',

          'Non-payment of rent',
          'Violation of lease terms',

          'Health or safety violations',

        heading: 'The Eviction Timeline', type: 'callouts',

          { type: 'blue', icon: '1️⃣', title: 'Step 1: Written Notice', text: 'The landlord must give written notice before filing. For non-payment of rent, this is typically a pay-or-quit notice. Notice length for other reasons depends on the tenancy type, lease terms, and local law.' },

    questions: [

let current = 0, answers = [], answered = [], score = 0;

function setProgress(idx) {
  document.getElementById('prog-fill').style.width=((idx+1)/slides.length*100)+'%';
  document.getElementById('prog-count').textContent=idx<slides.length-1?'Slide '+(idx+1)+' of '+(slides.length-1):'Knowledge Check';
}

function renderLearn(slide, idx) {
  let sectionsHtml = '';
  for (const sec of slide.sections) {
    let inner = '';
    if (sec.type==='grid') inner='<div class="detail-grid">'+sec.items.map(i=>`<div class="detail-item"><div class="detail-label">${i.label}</div><div class="detail-value">${i.value}</div>${i.sub?`<div class="detail-sub">${i.sub}</div>`:''}</div>`).join('')+'</div>';
    else if (sec.type==='callouts') inner=sec.items.map(i=>`<div class="callout ${i.type}"><div class="callout-icon">${i.icon}</div><div class="callout-body"><div class="callout-title">${i.title}</div><div class="callout-text">${i.text}</div></div></div>`).join('');
    else if (sec.type==='list') inner='<ul class="list-items">'+sec.items.map(i=>`<li>${i}</li>`).join('')+'</ul>';
    sectionsHtml+=`<div class="section-block"><div class="section-heading">${sec.heading}</div>${inner}</div>`;
  }
  return `<div class="card-header"><div class="slide-label">${slide.label}</div><div class="slide-title">${slide.title}</div></div>
    <div class="card-body">${slide.intro?`<p class="intro-text">${slide.intro}</p>`:''}${sectionsHtml}</div>
    <div class="card-nav"><button class="btn" onclick="go(${idx-1})" ${idx===0?'disabled':''}>← Back</button><button class="btn primary" onclick="go(${idx+1})">${idx===slides.length-2?'Take the Quiz →':'Next →'}</button></div>`;
}

function renderQuiz(slide, idx) {
  const allAnswered=slide.questions.every((_,qi)=>answered[qi]!==undefined);
  let qHtml=slide.questions.map((q,qi)=>{
    const ua=answered[qi];
    const opts=q.options.map((opt,oi)=>{
      let cls='option';
      if(ua!==undefined){if(oi===q.correct)cls+=' correct';else if(oi===ua)cls+=' wrong';}
      return `<button class="${cls}" onclick="answer(${qi},${oi})" ${ua!==undefined?'disabled':''}><span class="opt-letter">${['A','B','C','D'][oi]}</span><span>${opt}</span></button>`;
    }).join('');
    const fb=ua!==undefined?`<div class="feedback ${ua===q.correct?'correct':'wrong'}">${ua===q.correct?'✅ ':'❌ '}${q.feedback}</div>`:'';
    return `<div style="margin-bottom:2rem;padding-bottom:${qi<slide.questions.length-1?'2rem':'0'};border-bottom:${qi<slide.questions.length-1?'1px solid var(--gray-200)':'none'}"><div class="quiz-progress">Question ${qi+1} of ${slide.questions.length}</div><div class="question-text">${q.text}</div><div class="options">${opts}</div>${fb}</div>`;
  }).join('');
  return `<div class="card-header"><div class="slide-label">${slide.label}</div><div class="slide-title">${slide.title}</div></div>
    <div class="card-body">${qHtml}${allAnswered?`<div style="text-align:center;margin-top:1rem"><button class="btn primary" onclick="showResults()">See My Results →</button></div>`:''}</div>
    <div class="card-nav"><button class="btn" onclick="go(${idx-1})">← Back to Training</button><span style="font-size:13px;color:var(--text-muted)">${Object.keys(answered).length} of ${slide.questions.length} answered</span></div>`;
}

function renderResults() {
  const total=slides[slides.length-1].questions.length,pct=Math.round((score/total)*100);
  const c=2*Math.PI*48,dash=(pct/100)*c;
  const ringColor=pct>=80?'#0F6E56':pct>=60?'#BA7517':'#A32D2D';
  const headline=pct>=80?'Well done!':pct>=60?'Good effort!':'Keep studying!';
  const sub=pct>=80?'You have a solid grasp of Maryland landlord-tenant law.':pct>=60?'Review the sections where you missed questions, then retake.':'Go back through the training slides before retaking.';
  document.getElementById('prog-fill').style.width='100%';
  document.getElementById('prog-count').textContent='Complete';
  return `<div class="results-wrap"><div class="slide-label" style="text-align:center;margin-bottom:0.5rem">Quiz Complete</div>
    <div class="score-ring-wrap"><svg width="110" height="110" viewBox="0 0 110 110"><circle cx="55" cy="55" r="48" fill="none" stroke="#E8E8E4" stroke-width="9"/><circle cx="55" cy="55" r="48" fill="none" stroke="${ringColor}" stroke-width="9" stroke-dasharray="${dash.toFixed(1)} ${c.toFixed(1)}" stroke-linecap="round" transform="rotate(-90 55 55)"/></svg><div class="score-num">${pct}%</div></div>
    <div class="result-headline">${headline}</div><div class="result-sub">${sub}</div>
    <div class="result-tally">You got <strong>${score} of ${total}</strong> questions correct</div>
    <div class="divider"></div>
    <div class="topics-row"><span class="topic-badge a">Lease Agreements</span><span class="topic-badge b">Security Deposits</span><span class="topic-badge c">Landlord Obligations</span><span class="topic-badge d">Eviction Process</span></div>
    <div class="result-nav"><button class="btn" onclick="restartFull()">← Restart Full Training</button><button class="btn primary" onclick="retakeQuiz()">Retake Quiz</button></div></div>`;
}

function answer(qi,oi){if(answered[qi]!==undefined)return;answers[qi]=oi;answered[qi]=oi;if(oi===slides[slides.length-1].questions[qi].correct)score++;render();}
function showResults(){document.getElementById('content').innerHTML=renderResults();}
function retakeQuiz(){answers=[];answered=[];score=0;current=slides.length-1;render();}
function restartFull(){answers=[];answered=[];score=0;current=0;render();}
function go(n){if(n<0||n>=slides.length)return;current=n;render();}
function render(){
  setProgress(current);
  const slide=slides[current];
  document.getElementById('content').innerHTML=slide.type==='learn'?renderLearn(slide,current):renderQuiz(slide,current);
  window.scrollTo({top:0,behavior:'smooth'});
}
render();
</script>
</body>
</html>
