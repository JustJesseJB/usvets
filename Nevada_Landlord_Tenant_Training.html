function setProgress(idx) {
  document.getElementById('prog-fill').style.width = ((idx+1)/slides.length*100)+'%';
  document.getElementById('prog-count').textContent = idx < slides.length-1 ? 'Slide '+(idx+1)+' of '+(slides.length-1) : 'Knowledge Check';
}

function renderLearn(slide, idx) {
  let sectionsHtml = '';
  for (const sec of slide.sections) {
    let inner = '';
    if (sec.type==='grid') inner = '<div class="detail-grid">'+sec.items.map(i=>`<div class="detail-item"><div class="detail-label">${i.label}</div><div class="detail-value">${i.value}</div>${i.sub?`<div class="detail-sub">${i.sub}</div>`:''}</div>`).join('')+'</div>';
    else if (sec.type==='callouts') inner = sec.items.map(i=>`<div class="callout ${i.type}"><div class="callout-icon">${i.icon}</div><div class="callout-body"><div class="callout-title">${i.title}</div><div class="callout-text">${i.text}</div></div></div>`).join('');
    else if (sec.type==='list') inner = '<ul class="list-items">'+sec.items.map(i=>`<li>${i}</li>`).join('')+'</ul>';
    sectionsHtml += `<div class="section-block"><div class="section-heading">${sec.heading}</div>${inner}</div>`;
  }
  return `<div class="card-header"><div class="slide-label">${slide.label}</div><div class="slide-title">${slide.title}</div></div>
    <div class="card-body">${slide.intro?`<p class="intro-text">${slide.intro}</p>`:''}${sectionsHtml}</div>
    <div class="card-nav"><button class="btn" onclick="go(${idx-1})" ${idx===0?'disabled':''}>← Back</button><button class="btn primary" onclick="go(${idx+1})">${idx===slides.length-2?'Take the Quiz →':'Next →'}</button></div>`;
}

function renderQuiz(slide, idx) {
  const allAnswered = slide.questions.every((_,qi)=>answered[qi]!==undefined);
  let qHtml = slide.questions.map((q,qi)=>{
    const ua=answered[qi];
    const opts=q.options.map((opt,oi)=>{
      let cls='option';
      if(ua!==undefined){if(oi===q.correct)cls+=' correct';else if(oi===ua)cls+=' wrong';}
      return `<button class="${cls}" onclick="answer(${qi},${oi})" ${ua!==undefined?'disabled':''}><span class="opt-letter">${['A','B','C','D'][oi]}</span><span>${opt}</span></button>`;
    }).join('');
    const fb=ua!==undefined?`<div class="feedback ${ua===q.correct?'correct':'wrong'}">${ua===q.correct?'✅ ':'❌ '}${q.feedback}</div>`:'';
    return `<div style="margin-bottom:2rem;padding-bottom:${qi<slide.questions.length-1?'2rem':'0'};border-bottom:${qi<slide.questions.length-1?'1px solid var(--gray-200)':'none'}"><div class="quiz-progress">Question ${qi+1} of ${slide.questions.length}</div><div class="question-text">${q.text}</div><div class="options">${opts}</div>${fb}</div>`;
  }).join('');
  return `<div class="card-header"><div class="slide-label">${slide.label}</div><div class="slide-title">${slide.title}</div></div>
    <div class="card-body">${qHtml}${allAnswered?`<div style="text-align:center;margin-top:1rem"><button class="btn primary" onclick="showResults()">See My Results →</button></div>`:''}</div>
    <div class="card-nav"><button class="btn" onclick="go(${idx-1})">← Back to Training</button><span style="font-size:13px;color:var(--text-muted)">${Object.keys(answered).length} of ${slide.questions.length} answered</span></div>`;
}

function renderResults() {
  const total=slides[slides.length-1].questions.length, pct=Math.round((score/total)*100);
  const c=2*Math.PI*48, dash=(pct/100)*c;
  const ringColor=pct>=80?'#0F6E56':pct>=60?'#BA7517':'#A32D2D';
  const headline=pct>=80?'Well done!':pct>=60?'Good effort!':'Keep studying!';
  const sub=pct>=80?'You have a solid grasp of Nevada landlord-tenant law.':pct>=60?'Review the sections where you missed questions, then retake.':'Go back through the training slides before retaking.';
  document.getElementById('prog-fill').style.width='100%';
  document.getElementById('prog-count').textContent='Complete';
  return `<div class="results-wrap"><div class="slide-label" style="text-align:center;margin-bottom:0.5rem">Quiz Complete</div>
    <div class="score-ring-wrap"><svg width="110" height="110" viewBox="0 0 110 110"><circle cx="55" cy="55" r="48" fill="none" stroke="#E8E8E4" stroke-width="9"/><circle cx="55" cy="55" r="48" fill="none" stroke="${ringColor}" stroke-width="9" stroke-dasharray="${dash.toFixed(1)} ${c.toFixed(1)}" stroke-linecap="round" transform="rotate(-90 55 55)"/></svg><div class="score-num">${pct}%</div></div>
    <div class="result-headline">${headline}</div><div class="result-sub">${sub}</div>
    <div class="result-tally">You got <strong>${score} of ${total}</strong> questions correct</div>
    <div class="divider"></div>
    <div class="topics-row"><span class="topic-badge a">Lease Agreements</span><span class="topic-badge b">Security Deposits</span><span class="topic-badge c">Landlord Obligations</span><span class="topic-badge d">Eviction Process</span></div>
    <div class="result-nav"><button class="btn" onclick="restartFull()">← Restart Full Training</button><button class="btn primary" onclick="retakeQuiz()">Retake Quiz</button></div></div>`;
}

function answer(qi,oi){if(answered[qi]!==undefined)return;answers[qi]=oi;answered[qi]=oi;if(oi===slides[slides.length-1].questions[qi].correct)score++;render();}
function showResults(){document.getElementById('content').innerHTML=renderResults();}
function retakeQuiz(){answers=[];answered=[];score=0;current=slides.length-1;render();}
function restartFull(){answers=[];answered=[];score=0;current=0;render();}
function go(n){if(n<0||n>=slides.length)return;current=n;render();}
function render(){
  setProgress(current);
  const slide=slides[current];
  document.getElementById('content').innerHTML=slide.type==='learn'?renderLearn(slide,current):renderQuiz(slide,current);
  window.scrollTo({top:0,behavior:'smooth'});
}
render();
</script>
</body>
</html>
